name: CI ML Workflow

on:
  push:
    branches:
      - main

jobs:
  train-and-build:

    runs-on: ubuntu-latest

    steps:

      # 1. Checkout Repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # 3. Install Dependencies
      - name: Install Dependencies
        run: |
          pip install mlflow pandas numpy scikit-learn matplotlib seaborn

      # 4. Run MLflow Project
      - name: Run MLflow Project
        run: |
          mlflow run MLProject --env-manager=local

      # 5. Debug isi folder mlruns
      - name: Debug MLruns
        run: |
          find MLProject/mlruns

      # 6. Upload Artifact
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mlruns-artifact
          path: MLProject/mlruns/

      # 7. Login Docker Hub
      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # 8. Cari lokasi model otomatis
      - name: Find Model Path
        run: |
          MODEL_PATH=$(find MLProject/mlruns -type d -name model | head -n 1)

          echo "Model path ditemukan:"
          echo $MODEL_PATH

      # 9. Build Docker Image
      - name: Build Docker Image with MLflow
        run: |
          MODEL_PATH=$(find MLProject/mlruns -type d -name model | head -n 1)

          mlflow models build-docker \
            -m "$MODEL_PATH" \
            -n ${{ secrets.DOCKER_USERNAME }}/workflow-ci

      # 10. Push Docker Image
      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/workflow-ci